<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Port St. Lucie SC — You're watching a club be born.</title>

  <!-- Fuentes de marca (Ferryman, Druk, Druk Text Wide, FF Tisa, Cabazon) -->
  <link rel="stylesheet" href="../tokens/fonts.css?v=22" />

  <!-- Tokens -->
  <link rel="stylesheet" href="../tokens/tokens.css?v=22" />

  <!-- Patrones compartidos -->
  <link rel="stylesheet" href="../native/_patterns/cards.css?v=22" />
  <link rel="stylesheet" href="../native/_patterns/motion.css?v=22" />

  <!-- Bloques nativos -->
  <link rel="stylesheet" href="../native/home/00-nav.css?v=22" />
  <link rel="stylesheet" href="../native/home/01-hero.css?v=22" />
  <link rel="stylesheet" href="../native/home/02-stats.css?v=22" />
  <link rel="stylesheet" href="../native/home/03-project.css?v=22" />
  <link rel="stylesheet" href="../native/home/04-proof.css?v=22" />
  <link rel="stylesheet" href="../native/home/04b-fixtures.css?v=22" />
  <link rel="stylesheet" href="../native/home/05-jersey.css?v=22" />
  <link rel="stylesheet" href="../native/home/06-founders.css?v=22" />
  <link rel="stylesheet" href="../native/home/07-academy.css?v=22" />
  <link rel="stylesheet" href="../native/home/08-news.css?v=22" />
  <link rel="stylesheet" href="../native/home/09-cierre-footer.css?v=22" />

  <!-- Piezas a medida -->
  <link rel="stylesheet" href="../custom/live-counter/live-counter.css?v=22" />
  <link rel="stylesheet" href="../custom/jersey-viewer/jersey-viewer.css?v=22" />
  <link rel="stylesheet" href="../custom/founder-wall/founder-wall.css?v=22" />
  <link rel="stylesheet" href="../custom/fixtures/fixtures.css?v=22" />

  <style>
    html, body { margin: 0; padding: 0; background: var(--color-ink); }
    body { font-family: var(--font-body); color: var(--color-text); overflow-x: hidden; }
    ::selection { background: var(--color-aqua); color: var(--color-black); }
  </style>
</head>
<body>
  <div data-block="00-nav"></div>
  <div data-block="01-hero"></div>
  <div data-block="02-stats"></div>
  <div data-block="03-project"></div>
  <div data-block="04-proof"></div>
  <div data-block="04b-fixtures"></div>
  <div data-block="05-jersey"></div>
  <div data-block="06-founders"></div>
  <div data-block="07-academy"></div>
  <div data-block="08-news"></div>
  <div data-block="09-cierre-footer"></div>

  <!-- Ensamblaje de bloques (solo para preview; en WordPress cada bloque se inserta por separado) -->
  <script type="module">
    const blocks = [
      '00-nav', '01-hero', '02-stats', '03-project', '04-proof', '04b-fixtures',
      '05-jersey', '06-founders', '07-academy', '08-news', '09-cierre-footer',
    ];
    const bust = `?t=${Date.now()}`;   // cache-buster solo-preview para los HTML de bloque
    await Promise.all(blocks.map(async (name) => {
      const html = await fetch(`../native/home/${name}.html${bust}`).then((r) => r.text());
      document.querySelector(`[data-block="${name}"]`).innerHTML = html;
    }));
    // i18n primero (aplica idioma guardado antes de que arranquen las animaciones)
    const { initI18n } = await import('../i18n/i18n.js?v=22');
    initI18n();
    // init de scripts nativos que dependen del DOM ya inyectado + sistema de motion
    const [{ initNewsletter }, { initHeroMorph }, { initProofTimeline }, { initMotion }] = await Promise.all([
      import('../native/home/09-cierre-footer.js?v=22'),
      import('../native/home/01-hero.js?v=22'),
      import('../native/home/04-proof.js?v=22'),
      import('../native/_patterns/motion.js?v=22'),
    ]);
    initNewsletter();
    initHeroMorph();
    initProofTimeline();
    initMotion();   // activa reveal, parallax, nav reactiva, grano, cursor — tras inyectar los bloques
  </script>

  <!-- Web components a medida -->
  <script type="module" src="../custom/live-counter/live-counter.js?v=22"></script>
  <script type="module" src="../custom/jersey-viewer/jersey-viewer.js?v=22"></script>
  <script type="module" src="../custom/founder-wall/founder-wall.js?v=22"></script>
  <script type="module" src="../custom/fixtures/fixtures.js?v=22"></script>
</body>
</html>
