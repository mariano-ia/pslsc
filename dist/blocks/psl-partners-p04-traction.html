.pslsc .nav__progress{position: absolute;
  left: 0;

.pslsc .nav__links a.is-active{color: var(--color-text);}

<script type="module" src="data:text/javascript;charset=utf-8,/**%0A * Configuración por variante del %3Cpsl-live-counter%3E.%0A * Misma data, distinto framing según la audiencia (fan vs sponsor).%0A * Máximo 4 métricas por variante. %22lastJoined%22 es la métrica de actividad reciente.%0A *%0A * HANDOFF (WP): cada variante trae su `endpoint` (ej. /api/live-counter?scope=home). Ese es el%0A * contrato a implementar; hoy los valores salen de _demoData() en live-counter.js.%0A */%0A%0Aconst LIVE_COUNTER_CONFIG = {%0A  // Home · Stats proof band — layout del diseño aprobado: 2 métricas vivas + 2 hitos fijos.%0A  // 2027 va en acento teal (accent:true). Formato %22static%22 = valor fijo del contrato, no anima.%0A  stats: {%0A    endpoint: '/api/live-counter?scope=home',%0A    updateFrequencyMs: 8000,%0A    // `rising: true` (SOLO variante stats) marca una métrica %22en alza%22: dibuja una flechita aqua%0A    // apuntando para arriba al lado del número. fan/reservation/sponsor no la usan.%0A    metrics: [%0A      { key: 'founders', label: 'Founding Members', labelEs: 'Miembros Fundadores', format: 'integer', rising: true },%0A      { key: 'deposits2027', label: 'Ticket Deposits', labelEs: 'Depósitos de Entradas', format: 'integer', rising: true },%0A      { key: 'daysToWhistle', label: 'Days to first whistle', labelEs: 'Días para el primer silbato', format: 'integer', accent: true },%0A      { key: 'league', label: 'League One · Pro', labelEs: 'League One · Pro', format: 'static' },%0A    ],%0A  },%0A%0A  // Bloque 02 (Home) — para Marco: número grande + label simple = prueba social.%0A  fan: {%0A    endpoint: '/api/live-counter?scope=home',  // contrato esperado más abajo%0A    updateFrequencyMs: 30000, // espaciado -%3E usa highlight+fade, no odometer continuo%0A    metrics: [%0A      { key: 'founders', label: 'Founding Members', format: 'integer' },%0A      { key: 'deposits2027', label: '2027 Deposits', format: 'integer' },%0A      { key: 'founderWindow', label: 'Founder Window', format: 'text' },%0A      { key: 'lastJoined', label: 'Last Joined', format: 'relative-time' },%0A    ],%0A    note: 'Founder Window closes with the first match in 2027',%0A    showUpdated: true,%0A  },%0A%0A  // Bloques 06 / S03 (Reservá tu lugar / Cómo sumarte) — mismo dato, foco en la acción de reservar.%0A  reservation: {%0A    endpoint: '/api/live-counter?scope=reservations',%0A    updateFrequencyMs: 30000,%0A    metrics: [%0A      { key: 'deposits2027', label: '2027 Deposits', format: 'integer' },%0A      { key: 'lastJoined', label: 'Last Reserved', format: 'relative-time' },%0A    ],%0A    note: 'Refundable deposit — Founder Window closes with the first match in 2027',%0A    showUpdated: true,%0A  },%0A%0A  // Bloque P04 (Partners) — para sponsor/inversor: formato tipo pitch deck, growth framing.%0A  sponsor: {%0A    endpoint: '/api/live-counter?scope=partners',%0A    updateFrequencyMs: 30000,%0A    metrics: [%0A      { key: 'founderGrowthPercent', label: 'Founding Member Growth', labelEs: 'Crecimiento de Fundadores', format: 'growth-percent' },%0A      { key: 'monthlyReach', label: 'Monthly Reach', labelEs: 'Alcance Mensual', format: 'integer' },%0A      { key: 'depositsCaptured', label: 'Deposits Captured', labelEs: 'Depósitos Captados', format: 'currency' },%0A      { key: 'lastJoined', label: 'Last Joined', labelEs: 'Último Ingreso', format: 'relative-time' },%0A    ],%0A    // sin `note` ni `showUpdated`: el bloque cierra en las métricas (pedido del cliente).%0A  },%0A};%0A%0A/**%0A * Contrato de datos esperado del endpoint (a implementar por el developer WordPress).%0A * GET {endpoint} -%3E 200 OK%0A * {%0A *   %22founders%22: 1248,%0A *   %22deposits2027%22: 312,%0A *   %22founderWindow%22: %22Closes 2027%22,%0A *   %22lastJoinedSecondsAgo%22: 720,%0A *   %22monthlyReach%22: 18400,%0A *   %22depositsCaptured%22: 46800,%0A *   %22founderGrowthPercent%22: 23,%0A *   %22firstWhistle%22: %222027%22,%0A *   %22league%22: %22USL%22,%0A *   %22updatedAt%22: %222026-06-30T10:40:00Z%22%0A * }%0A * Métrica %22Updated in real time%22 se calcula en cliente a partir de updatedAt, no se hardcodea.%0A */%0A%0A%0A%0A/**%0A * %3Cpsl-live-counter variant=%22stats|fan|reservation|sponsor%22%3E%3C/psl-live-counter%3E%0A *%0A * 🟦 A medida — se usa en la Home (bloque 02, variant=%22stats%22) y en Partners (P04, variant=%22sponsor%22).%0A * Un solo componente reutilizado con distinta config (ver live-counter.config.js), no piezas separadas.%0A *%0A * Criterios de diseño:%0A * - tabular-nums (token global .tnum, ver tokens.css) para que los números no salten%0A * - máx 4 métricas; %22last joined%22 como prueba de actividad honesta%0A * - números exactos, nunca redondeados con %22+%22%0A * - highlight+fade en los updates para que se note que está vivo%0A * - mismo dato, distinto framing por variante (fan vs sponsor)%0A *%0A * HANDOFF (WP): sin backend todavía — usa datos demo + polling simulado. El contrato de API real%0A * está en live-counter.config.js. Reemplazar _demoData() por fetch(this.config.endpoint).%0A */%0Aclass PSLLiveCounter extends HTMLElement {%0A  connectedCallback() {%0A    this.variant = this.getAttribute('variant') || 'stats';%0A    this.config = LIVE_COUNTER_CONFIG[this.variant];%0A    if (!this.config) {%0A      console.warn(`psl-live-counter: variante desconocida %22${this.variant}%22`);%0A      return;%0A    }%0A    this._data = this._demoData();%0A    this._render();%0A    this._poll();%0A  }%0A%0A  disconnectedCallback() {%0A    clearInterval(this._pollHandle);%0A    if (this._wideMql %26%26 this._applyRelGrid) this._wideMql.removeEventListener('change', this._applyRelGrid);%0A  }%0A%0A  // ---- DEMO DATA — reemplazar por fetch(this.config.endpoint) cuando exista el endpoint real ----%0A  _demoData() {%0A    return {%0A      founders: 1248,%0A      deposits2027: 312,%0A      founderWindow: 'Closes 2027',%0A      lastJoinedSecondsAgo: 720,%0A      monthlyReach: 18400,%0A      depositsCaptured: 46800,%0A      founderGrowthPercent: 23,%0A      firstWhistle: '2027',%0A      // días hasta el primer silbato (2027-03-01) — cuenta viva; el count-up anima 0 -%3E valor%0A      daysToWhistle: Math.max(0, Math.ceil((new Date('2027-03-01T00:00:00') - new Date()) / 86400000)),%0A      league: 'USL',%0A      updatedAt: new Date().toISOString(),%0A    };%0A  }%0A%0A  _simulateIncrement() {%0A    // Solo para demo en ausencia de backend — simula que se suma 1 fundador esporádicamente.%0A    // Devuelve true cuando efectivamente se sumó un fundador (lo usa el toast %22+1%22 de la variante stats).%0A    if (Math.random() %3C 0.5) {%0A      this._data.founders += 1;%0A      this._data.lastJoinedSecondsAgo = 0;%0A      this._data.updatedAt = new Date().toISOString();%0A      return true;%0A    }%0A    this._data.lastJoinedSecondsAgo += this.config.updateFrequencyMs / 1000;%0A    return false;%0A  }%0A%0A  _poll() {%0A    this._pollHandle = setInterval(() =%3E {%0A      const founderAdded = this._simulateIncrement();%0A      this._update();%0A      // Toast %22+1%22 efímero — SOLO variante stats y una vez que el count-up inicial terminó.%0A      if (founderAdded %26%26 this.variant === 'stats' %26%26 this._countUpDone) this._showFounderToast();%0A    }, this.config.updateFrequencyMs);%0A  }%0A%0A  // Toast efímero sobre la métrica de fundadores: sube y se desvanece. Solo variante stats.%0A  // En reduced-motion no se muestra (regla 3). Se autolimpia al terminar la animación.%0A  _showFounderToast() {%0A    const reduce = typeof window !== 'undefined'%0A      %26%26 window.matchMedia %26%26 window.matchMedia('(prefers-reduced-motion: reduce)').matches;%0A    if (reduce) return;%0A    const cell = this._metricsEl.querySelector('[data-key=%22founders%22]');%0A    if (!cell) return;%0A    const toast = document.createElement('span');%0A    toast.className = 'live-counter__toast';%0A    toast.setAttribute('aria-hidden', 'true');%0A    toast.textContent = '+1 Founding member';%0A    cell.appendChild(toast);%0A    const cleanup = () =%3E toast.remove();%0A    toast.addEventListener('animationend', cleanup);%0A    setTimeout(cleanup, 2200); // fallback si no dispara animationend%0A  }%0A%0A  _render() {%0A    // La línea %22Updated in real time%22 es opt-in por variante (`showUpdated` en la config).%0A    // stats (Home) y sponsor (Partners) la tienen apagada por pedido del cliente.%0A    const updated = !this.config.showUpdated ? '' : `%0A        %3Cp class=%22live-counter__updated%22%3E%0A          %3Cspan class=%22live-counter__updated-text%22%3EUpdated in real time%3C/span%3E%0A        %3C/p%3E`;%0A    this.innerHTML = `%0A      %3Cdiv class=%22live-counter live-counter--${this.variant}%22%3E%0A        %3Cdiv class=%22live-counter__metrics%22%3E%3C/div%3E${updated}%0A      %3C/div%3E%0A    `;%0A    this._metricsEl = this.querySelector('.live-counter__metrics');%0A    this.config.metrics.forEach((m) =%3E {%0A      const cell = document.createElement('div');%0A      cell.className = 'live-counter__metric';%0A      cell.dataset.key = m.key;%0A      // Flecha %22en alza%22 (aqua, apunta arriba) junto al número — SOLO métricas con `rising: true`%0A      // (fundadores/depósitos en la variante stats). Reemplaza al viejo sparkline de barritas.%0A      const rise = this.variant === 'stats' %26%26 m.rising === true;%0A      const riseArrow = rise%0A        ? '%3Cspan class=%22live-counter__rise%22 aria-label=%22on the rise%22%3E%3Csvg viewBox=%220 0 16 16%22 width=%221em%22 height=%221em%22 fill=%22currentColor%22 aria-hidden=%22true%22%3E%3Cpath d=%22M8 2 L13.5 8.5 H10 V14 H6 V8.5 H2.5 Z%22/%3E%3C/svg%3E%3C/span%3E'%0A        : '';%0A      cell.innerHTML = `%0A        %3Cdiv class=%22live-counter__valrow%22%3E%0A          %3Cdiv class=%22live-counter__value tnum${m.accent ? ' live-counter__value--accent' : ''}%22 data-format=%22${m.format}%22%3E%3C/div%3E%0A          ${riseArrow}%0A        %3C/div%3E%0A        %3Cdiv class=%22live-counter__label%22%3E${m.label}%3C/div%3E%0A      `;%0A      this._metricsEl.appendChild(cell);%0A    });%0A    // Si la última métrica es de texto relativo (ej. %2212 min ago%22), su columna deja de ser 1fr%0A    // fijo y pasa a %22al menos el ancho de su contenido%22 — así el valor mantiene el mismo tamaño%0A    // de fuente que sus hermanos sin partirse en dos líneas ni desbordar.%0A    // En DESKTOP (grid de N columnas) la columna del relative-time toma el ancho de su contenido.%0A    // En tablet/mobile las media queries colapsan a 2/1 col → NO pisar con inline (ganaría y rompería%0A    // el responsive, desbordando %2212 min ago%22). Re-evaluar al cruzar el breakpoint.%0A    const lastMetric = this.config.metrics[this.config.metrics.length - 1];%0A    if (lastMetric %26%26 lastMetric.format === 'relative-time') {%0A      const n = this.config.metrics.length;%0A      this._wideMql = window.matchMedia('(min-width: 781px)');%0A      this._applyRelGrid = () =%3E {%0A        this._metricsEl.style.gridTemplateColumns = this._wideMql.matches%0A          ? `repeat(${n - 1}, 1fr) minmax(max-content, 1fr)` : '';%0A      };%0A      this._applyRelGrid();%0A      this._wideMql.addEventListener('change', this._applyRelGrid);%0A    }%0A    if (this.config.note) {%0A      const note = document.createElement('p');%0A      note.className = 'live-counter__note';%0A      note.textContent = this.config.note;%0A      this.querySelector('.live-counter').appendChild(note);%0A    }%0A%0A    // Render inicial: las métricas enteras arrancan en 0 y hacen count-up al entrar en viewport;%0A    // el resto se muestra directo.%0A    this._reveal(true);%0A    this._observeReveal();%0A  }%0A%0A  // separación de mils sin decimales (los enteros nunca llevan decimales)%0A  _fmtInt(n) { return Math.round(n).toLocaleString('en-US'); }%0A%0A  _isCountUp(m) { return m.format === 'integer'; }%0A%0A  _reveal(initial = false) {%0A    this.config.metrics.forEach((m) =%3E {%0A      const cell = this._metricsEl.querySelector(`[data-key=%22${m.key}%22] .live-counter__value`);%0A      if (initial %26%26 this._isCountUp(m)) {%0A        cell.textContent = '0';   // parte de 0; el count-up lo lleva al valor%0A        return;%0A      }%0A      const formatted = this._format(m);%0A      if (initial || cell.textContent === '') {%0A        cell.textContent = formatted;%0A        return;%0A      }%0A      if (cell.textContent !== formatted) this._animateChange(cell, formatted);%0A    });%0A  }%0A%0A  // Dispara el count-up cuando el componente entra en viewport (una sola vez).%0A  // Basado en getBoundingClientRect + scroll/load, sin depender de IntersectionObserver.%0A  _observeReveal() {%0A    const maybe = () =%3E {%0A      if (this._countUpDone) return;%0A      const r = this.getBoundingClientRect();%0A      const vh = window.innerHeight || document.documentElement.clientHeight;%0A      if (r.top %3C vh * 0.85 %26%26 r.bottom %3E 0) {%0A        this._countUpDone = true;%0A        window.removeEventListener('scroll', maybe);%0A        this._runCountUps();%0A      }%0A    };%0A    this._maybeReveal = maybe;%0A    window.addEventListener('scroll', maybe, { passive: true });%0A    requestAnimationFrame(maybe);   // chequeo inicial por si ya está en viewport%0A  }%0A%0A  // Anima 0 -%3E valor para cada métrica entera. Rápido, easeOut. tabular-nums + alineado a la%0A  // izquierda evitan cualquier salto de layout mientras crece la cantidad de dígitos.%0A  _runCountUps() {%0A    const reduce = typeof window !== 'undefined'%0A      %26%26 window.matchMedia %26%26 window.matchMedia('(prefers-reduced-motion: reduce)').matches;%0A    this.config.metrics.filter((m) =%3E this._isCountUp(m)).forEach((m) =%3E {%0A      const cell = this._metricsEl.querySelector(`[data-key=%22${m.key}%22] .live-counter__value`);%0A      const target = Number(this._data[m.key]) || 0;%0A      if (reduce) { cell.textContent = this._fmtInt(target); return; }%0A      const DURATION = 1200;%0A      const t0 = performance.now();%0A      const easeOut = (t) =%3E 1 - Math.pow(1 - t, 3);%0A      const tick = (now) =%3E {%0A        const t = Math.min((now - t0) / DURATION, 1);%0A        cell.textContent = this._fmtInt(target * easeOut(t));%0A        if (t %3C 1) requestAnimationFrame(tick);%0A        else cell.textContent = this._fmtInt(target);%0A      };%0A      requestAnimationFrame(tick);%0A    });%0A  }%0A%0A  // Update en vivo (polling): refleja incrementos.%0A  _update() {%0A    this.config.metrics.forEach((m) =%3E {%0A      const cell = this._metricsEl.querySelector(`[data-key=%22${m.key}%22] .live-counter__value`);%0A      // durante/antes del count-up inicial no pisar el valor animado de las métricas enteras%0A      if (this._isCountUp(m) %26%26 !this._countUpDone) return;%0A      const formatted = this._format(m);%0A      if (cell.textContent === formatted) return;%0A      // Métricas con count-up: actualizar el número en silencio (que cambie ES la prueba de %22vivo%22;%0A      // el flash teal se percibía como glitch al cargar). El resto sí usa highlight+fade.%0A      if (this._isCountUp(m)) cell.textContent = formatted;%0A      else this._animateChange(cell, formatted);%0A    });%0A  }%0A%0A  _animateChange(cell, newValue) {%0A    // Updates espaciados (%3E=30s en este config) -%3E highlight+fade, no odometer continuo.%0A    // (odometer reservado para updates por WebSocket cada segundo-minuto, fuera del alcance demo).%0A    cell.textContent = newValue;%0A    cell.classList.remove('live-counter__value--highlight');%0A    void cell.offsetWidth; // reflow para reiniciar la animación%0A    cell.classList.add('live-counter__value--highlight');%0A    setTimeout(() =%3E cell.classList.remove('live-counter__value--highlight'), 1500);%0A  }%0A%0A  // Cada métrica formatea su propio valor leyendo data[m.key] (o un derivado), nunca un campo fijo.%0A  _format(m) {%0A    const data = this._data;%0A    switch (m.format) {%0A      case 'integer':%0A        return Number(data[m.key]).toLocaleString('en-US');%0A      case 'currency':%0A        return `$${Number(data[m.key]).toLocaleString('en-US')}`;%0A      case 'growth-percent':%0A        return `+${data[m.key]}%25`;%0A      case 'relative-time':%0A        return this._relativeTime(data.lastJoinedSecondsAgo);%0A      case 'static':%0A      case 'text':%0A      default:%0A        return data[m.key];%0A    }%0A  }%0A%0A  _relativeTime(seconds) {%0A    if (seconds %3C 60) return 'Just now';%0A    const min = Math.floor(seconds / 60);%0A    if (min %3C 60) return `${min} min ago`;%0A    const hr = Math.floor(min / 60);%0A    return `${hr}h ago`;%0A  }%0A}%0A%0Aif(!customElements.get('psl-live-counter'))customElements.define('psl-live-counter',PSLLiveCounter);%0A%0A%0A%0A%0Afunction pslVw(){document.documentElement.style.setProperty('--psl-vw',document.documentElement.clientWidth+'px');}%0ApslVw(); addEventListener('resize',pslVw,{passive:true});%0Afunction pslBoot(){  if(window.__pslDiag) window.__pslDiag(); }%0Aif(document.readyState==='loading') document.addEventListener('DOMContentLoaded',pslBoot); else pslBoot();%0A"></script>
