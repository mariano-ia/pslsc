<script type="module" src="data:text/javascript;charset=utf-8,/**%0A * %3Cpsl-jersey-viewer%3E%3C/psl-jersey-viewer%3E%0A *%0A * 🟦 A medida — bloque 05 (La camiseta / Shop). Stage 360° scroll-scrubbed.%0A * Secuencia de N frames (giro real de la camiseta, del render 360_shirt.mp4) mapeada al SCROLL:%0A * el giro COMPLETO (frente → perfil → espalda) ocurre mientras el stage está totalmente visible%0A * (de %22entra completo abajo%22 a %22llega arriba%22), así se ve el 180° entero sin tener que pasarlo de largo.%0A *%0A * Suavidad: el frame mostrado persigue al objetivo con damping (lerp), de modo que un scroll rápido%0A * recorre los frames intermedios en vez de saltar. Se dibuja en %3Ccanvas%3E (sin parpadeo).%0A *%0A * reduced-motion / sin scroll aún = frame 0 (frente) estático.%0A *%0A * Assets: __PSL_ASSET_BASE__/assets/jersey360/f_00.webp … f_89.webp (recorte 4:5, generados del render).%0A */%0Aconst FRAMES = 90;%0Aconst framePath = (i) =%3E `__PSL_ASSET_BASE__/assets/jersey360/f_${String(i).padStart(2, '0')}.webp`;%0Aconst clamp = (v, a, b) =%3E Math.min(Math.max(v, a), b);%0Aconst DAMP = 0.18; // 0..1 — más bajo = más suave/perezoso; más alto = más pegado al scroll%0A%0Aclass PSLJerseyViewer extends HTMLElement {%0A  connectedCallback() {%0A    this._idx = -1;       // -1 → fuerza el primer dibujo%0A    this._current = 0;    // frame mostrado (fraccional, suavizado)%0A    this._target = 0;     // frame objetivo según el scroll%0A    this._animing = false;%0A    this._render();%0A    this._preload();%0A    this._bindScroll();%0A  }%0A%0A  disconnectedCallback() {%0A    window.removeEventListener('scroll', this._onScroll);%0A    window.removeEventListener('resize', this._onResize);%0A    cancelAnimationFrame(this._raf);%0A  }%0A%0A  _render() {%0A    this.innerHTML = `%0A      %3Cdiv class=%22jviewer%22 role=%22img%22 aria-label=%22Founders edition jersey — 360° view%22%3E%0A        %3Cdiv class=%22jviewer__skeleton%22%3E%3Cdiv class=%22jviewer__skeleton-shape%22%3E%3C/div%3E%3C/div%3E%0A        %3Ccanvas class=%22jviewer__canvas%22%3E%3C/canvas%3E%0A        %3Cspan class=%22jviewer__tag jviewer__tag--hint%22%3ESCROLL TO ROTATE%3C/span%3E%0A      %3C/div%3E%0A    `;%0A    this._stage = this.querySelector('.jviewer');%0A    this._canvas = this.querySelector('.jviewer__canvas');%0A    this._ctx = this._canvas.getContext('2d');%0A    this._hint = this.querySelector('.jviewer__tag--hint');%0A  }%0A%0A  _preload() {%0A    this._stage.classList.add('is-loading');%0A    this._imgs = new Array(FRAMES);%0A    for (let i = 0; i %3C FRAMES; i++) {%0A      const im = new Image();%0A      im.decoding = 'async';%0A      if (i === 0) {%0A        im.onload = () =%3E {%0A          this._sizeCanvas();%0A          this._draw(0);%0A          this._stage.classList.remove('is-loading');%0A          this._stage.classList.add('is-loaded');%0A        };%0A      }%0A      im.src = framePath(i);%0A      this._imgs[i] = im;%0A    }%0A  }%0A%0A  _sizeCanvas() {%0A    const dpr = Math.min(window.devicePixelRatio || 1, 2);%0A    const rect = this._stage.getBoundingClientRect();%0A    if (!rect.width) return;%0A    this._canvas.width = Math.round(rect.width * dpr);%0A    this._canvas.height = Math.round(rect.height * dpr);%0A  }%0A%0A  // frames 4:5 = stage 4:5 → drawImage a canvas completo (fill, sin distorsión)%0A  _draw(idx) {%0A    const im = this._imgs %26%26 this._imgs[idx];%0A    if (!im || !im.complete || !im.naturalWidth) return;%0A    const { width: cw, height: ch } = this._canvas;%0A    this._ctx.clearRect(0, 0, cw, ch);%0A    this._ctx.drawImage(im, 0, 0, cw, ch);%0A  }%0A%0A  _bindScroll() {%0A    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return; // frente estático%0A    this._onScroll = () =%3E this._kick();%0A    this._onResize = () =%3E { this._sizeCanvas(); this._kick(); };%0A    window.addEventListener('scroll', this._onScroll, { passive: true });%0A    window.addEventListener('resize', this._onResize, { passive: true });%0A    this._kick();%0A  }%0A%0A  _kick() {%0A    if (this._animing) return;%0A    this._animing = true;%0A    this._raf = requestAnimationFrame(() =%3E this._tick());%0A  }%0A%0A  _tick() {%0A    const r = this._stage.getBoundingClientRect();%0A    const vh = window.innerHeight || document.documentElement.clientHeight;%0A    const h = r.height;%0A    // giro completo mientras el stage está TOTALMENTE visible:%0A    // p=0 cuando entra completo (bottom alineado abajo) → p=1 cuando su top llega arriba (rect.top=0).%0A    // el rango es la ventana de %22totalmente visible%22 (vh - h); piso vh*0.35 si el stage es muy alto.%0A    const denom = Math.max(vh - h, vh * 0.35) || 1;%0A    const p = clamp(((vh - h) - r.top) / denom, 0, 1);%0A    this._target = p * (FRAMES - 1);%0A%0A    const diff = this._target - this._current;%0A    this._current += diff * DAMP;%0A    this._drawIdx();%0A%0A    this._hint.classList.toggle('is-hidden', p %3E 0.04);%0A%0A    if (Math.abs(diff) %3E 0.03) {%0A      this._raf = requestAnimationFrame(() =%3E this._tick());%0A    } else {%0A      this._current = this._target;%0A      this._drawIdx();%0A      this._animing = false;%0A    }%0A  }%0A%0A  _drawIdx() {%0A    const idx = clamp(Math.round(this._current), 0, FRAMES - 1);%0A    if (idx !== this._idx) { this._idx = idx; this._draw(idx); }%0A  }%0A}%0A%0Aif(!customElements.get('psl-jersey-viewer'))customElements.define('psl-jersey-viewer',PSLJerseyViewer);%0A%0A%0A%0A%0Afunction pslVw(){document.documentElement.style.setProperty('--psl-vw',document.documentElement.clientWidth+'px');}%0ApslVw(); addEventListener('resize',pslVw,{passive:true});%0Afunction pslBoot(){  if(window.__pslDiag) window.__pslDiag(); }%0Aif(document.readyState==='loading') document.addEventListener('DOMContentLoaded',pslBoot); else pslBoot();%0A"></script>
