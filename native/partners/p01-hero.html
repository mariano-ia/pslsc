<!--
  Bloque P01 · Apertura — Partners. 🟩 Nativo.
  Mismo lenguaje visual del Hero, pero el héroe es el ESTADIO APROBADO, no el club.
  Copy más directo/comercial — única página donde hablarle a marca/inversor en su idioma.
  CTAs del wireframe: Request the partner deck / Talk to our team.
-->
<section class="phero surface-ink" id="top">
  <!-- fondo: video de la construcción del estadio (estructura de acero al atardecer) + poster de
       fallback. data-parallax: deriva sutil con el scroll; .phero__bg va sobredimensionado en CSS
       para que el desplazamiento no deje huecos en los bordes. -->
  <div class="phero__bg" aria-hidden="true" data-parallax="0.10">
    <video class="phero__video" autoplay loop muted playsinline preload="auto"
           poster="/assets/videos/partners-hero-poster.webp">
      <source src="/assets/videos/partners-hero.mp4" type="video/mp4" />
    </video>
  </div>
  <div class="phero__scrim" aria-hidden="true"></div>

  <div class="psl-container phero__content">
    <div class="phero__eyebrow">
      <span class="phero__dot" aria-hidden="true"></span>
      <span>Partners · Sponsors · Investors</span>
    </div>
    <h1 class="phero__headline">Build it with us.</h1>
    <p class="phero__subhead">
      An approved stadium, a professional debut in 2027, and a city that&rsquo;s never had a club of
      its own. Get in before the first whistle — while the ground floor is still the ground floor.
    </p>
    <div class="phero__ctas">
      <a href="#contact" class="psl-btn cta-primary"><span>Request the partner deck</span> <span aria-hidden="true">→</span></a>
      <a href="#contact" class="psl-btn cta-secondary">Talk to our team</a>
    </div>
  </div>

  <div class="phero__divider" role="presentation"></div>
</section>
