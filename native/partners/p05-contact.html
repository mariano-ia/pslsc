<!--
  Bloque P05 · Hablemos — Partners. 🟩 Nativo.
  Form "humano, no corporativo" — evitar "Submit your inquiry".
  Descarga del partner deck + form de contacto (nombre, empresa, email, mensaje).

  CONTRATO (a implementar en WordPress — no hay backend acá):
    Submit del form -> POST /api/partner-contact
      { "name": "...", "company": "...", "email": "...", "message": "..." } -> 200
    "Download the deck" -> enlace al PDF del partner deck (definir href real).
-->
<section class="pcontact surface-ink" id="contact">
  <div class="psl-container pcontact__grid">
    <div class="pcontact__intro">
      <span class="psl-kicker">04 — Let's talk</span>
      <h2 class="psl-h2 pcontact__title">Tell us who you are. We&rsquo;ll take it from there.</h2>
      <p class="pcontact__lead">No forms into a void. A real person on our side reads every message and gets back to you — usually within a couple of days.</p>
      <a href="#deck" class="pcontact__deck" data-external="partner-deck">
        <span class="pcontact__deck-icon" aria-hidden="true">↓</span>
        <span>
          <span class="pcontact__deck-title">Download the partner deck</span>
          <span class="pcontact__deck-note">PDF · numbers, plans, and how partnerships work</span>
        </span>
      </a>
    </div>

    <form class="pcontact__form" data-partner-contact>
      <label class="pfield">
        <span class="pfield__label">Your name</span>
        <input class="pfield__input" type="text" name="name" autocomplete="name" required />
      </label>
      <label class="pfield">
        <span class="pfield__label">Company</span>
        <input class="pfield__input" type="text" name="company" autocomplete="organization" />
      </label>
      <label class="pfield">
        <span class="pfield__label">Email</span>
        <input class="pfield__input" type="email" name="email" autocomplete="email" required />
      </label>
      <label class="pfield">
        <span class="pfield__label">What do you have in mind?</span>
        <textarea class="pfield__input pfield__input--area" name="message" rows="4"></textarea>
      </label>
      <button type="submit" class="psl-btn cta-primary pcontact__submit"><span>Send it over</span> <span aria-hidden="true">→</span></button>
      <p class="pcontact__msg" data-partner-msg role="status" aria-live="polite"></p>
    </form>
  </div>
</section>
