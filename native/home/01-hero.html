<!--
  Bloque 01 · Hero — Home. 🟩 Nativo.
  Decisiones benchmark Hero: titular dominante full-width (2 niveles), fondo = render de obra
  (placeholder acá), 1 CTA primario + 1 secundario, strip debajo del hero.
  El strip se resuelve como marquee de hitos (LAND APPROVED, GROUND BROKEN, ...) — prueba de que
  la obra es real (JTBD "verificar que el proyecto existe"), en lugar de un countdown.
-->
<section class="hero surface-ink" id="hero">
  <!-- Fondo del hero: video loopeado (vid01→vid02→vid03 concatenados) + poster de fallback.
       data-parallax: deriva vertical sutil con el scroll; .hero__bg está agrandado en CSS
       (inset negativo) para que el desplazamiento NO deje huecos en los bordes. -->
  <div class="hero__bg" aria-hidden="true" data-parallax="0.10">
    <video class="hero__video" autoplay loop muted playsinline preload="auto"
           poster="/assets/videos/hero-poster.webp">
      <source src="/assets/videos/hero.mp4" type="video/mp4" />
    </video>
  </div>
  <div class="hero__scrim" aria-hidden="true"></div>

  <div class="psl-container hero__content">
    <div class="hero__eyebrow">
      <span>PORT ST. LUCIE, FL — DEBUT USL LEAGUE ONE 2027</span>
    </div>
    <h1 class="hero__headline"><span class="hero__morph-prefix">You&rsquo;re watching a club be</span> <span class="hero__morph" aria-label="born."><span class="hero__morph-sizer" aria-hidden="true">imagined.</span><span class="hero__morph-word" data-words="imagined,loved,born">born.</span></span></h1>
    <p class="hero__subhead">
      The first professional football club in Port St. Lucie — built on the Treasure Coast,
      shaped by Argentine football culture. Not a promise. A build already underway.
    </p>
    <div class="hero__ctas">
      <a href="sumate.html" class="psl-btn cta-primary"><span>Become a Founder</span> <span aria-hidden="true">→</span></a>
      <a href="#project" class="psl-btn cta-secondary">See the project</a>
    </div>
  </div>

  <!-- scroll-cue: invita a bajar (loop suave, decorativo) -->
  <div class="hero__scroll-cue" aria-hidden="true"><span></span></div>

  <!-- barra separadora con gradiente de marca (aquamarine → red marine) -->
  <div class="hero__divider" role="presentation"></div>
</section>
