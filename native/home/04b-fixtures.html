<section class="matchday surface-paper" id="matches">
  <div class="psl-container">
    <header class="matchday__head" data-reveal-group="90">
      <div data-reveal>
        <span class="psl-kicker">03 — Matchday</span>
        <h2 class="psl-h2 matchday__title">The reserve team plays now.</h2>
      </div>
      <p class="matchday__lead" data-reveal>The reserve team already competes every week in the USL Academy League. The first team debuts in 2027 — but the pitch is already in use.</p>
    </header>
    <psl-fixtures data-reveal data-reveal-delay="140"></psl-fixtures>
  </div>
</section>
