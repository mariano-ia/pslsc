<!--
  Bloque 06 · Founders — Home. 🟦 A medida (embebe <psl-founder-id> + <psl-departures-board>).
  Carnet de fundador (Luka #0001 default; el usuario hace el suyo con cámara y lo comparte)
  + tablero split-flap de abordaje. Ver /custom/founder-id/ y /custom/departures-board/
-->
<section class="founders surface-paper" id="founders">
  <div class="psl-container">
    <header class="founders__head" data-reveal>
      <span class="psl-kicker">05 — Founding members</span>
      <h2 class="psl-h2 founders__title">Thousands will be in the stands. Few will say they boarded first.</h2>
    </header>

    <div class="founders__grid">
      <!-- carnet de fundador (hacé el tuyo con la cámara) -->
      <psl-founder-id data-reveal="left" data-reveal-delay="80"></psl-founder-id>

      <!-- tablero de partidas split-flap: "this flight is about to take off" -->
      <psl-departures-board data-reveal="right" data-reveal-delay="160"></psl-departures-board>
    </div>

    <!-- CTA único de membresía para los dos artefactos (pase + tablero) -->
    <div class="founders__cta" data-reveal data-reveal-delay="220">
      <a href="sumate.html#plans" class="psl-btn cta-primary founders__cta-btn"><span>Become a Founder</span> <span aria-hidden="true">→</span></a>
    </div>
  </div>
</section>
